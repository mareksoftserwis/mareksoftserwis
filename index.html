        .chip-btn:active { cursor: grabbing; }
        .chip-btn.dragging { opacity: 0.5; border: 2px dashed var(--primary); background: #f0f7ff; }
        .chip-btn.active { border-color: var(--primary); background: #e0f0ff; box-shadow: 0 0 10px rgba(74,144,226,0.3); }
        .edit-btn { position: absolute; top: 5px; right: 5px; font-size: 1.1rem; padding: 4px; opacity: 0.4; cursor: pointer; z-index: 10; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: #ddd; padding: 5px; border-radius: 10px; margin-top: 10px; }
        .day { padding: 10px 2px; background: #fff; border-radius: 5px; text-align: center; font-size: 0.8rem; cursor: pointer; min-height: 38px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; }
        .day.today { border: 3px solid var(--primary); }
        .day.has-data { border-bottom: 5px solid #1b944c !important; }
        .day.status-work { background: var(--work) !important; color: white; }
        .day.status-off { background: var(--danger) !important; color: white; }
        .day.status-vacation { background: var(--vacation) !important; color: white; }
        .day.status-sick { background: var(--sick) !important; color: black; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 10px; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-main { background: var(--primary); color: white; padding: 15px; }
        .btn-sec { background: #e2e8f0; color: #333; }
        .btn-danger { background: var(--danger); color: white; padding: 15px; }
        .nfc-status { text-align: center; font-size: 0.8rem; padding: 8px; border-radius: 8px; background: #f0f0f0; color: #666; margin-top: 10px; }
        .section-title { font-size: 0.95rem; font-weight: bold; color: #555; margin: 15px 0 5px 0; border-left: 3px solid var(--primary); padding-left: 8px; }
    </style>
</head>

<script>

    var userLang = 'pl';
    try {
        if (navigator && (navigator.language || navigator.browserLanguage)) {
            userLang = (navigator.language || navigator.browserLanguage).split('-')[0];
        }
    } catch(e) { console.log("Language detection bypassed"); }

    var MONTHS = ["Stycze≈Д","Luty","Marzec","Kwiecie≈Д","Maj","Czerwiec","Lipiec","Sierpie≈Д","Wrzesie≈Д","Pa≈Їdziernik","Listopad","Grudzie≈Д"];
    var DAYS_SHORT = ['Pn','Wt','≈Ъr','Cz','Pt','So','Nd'];
    var DAYS_FULL = ["Niedziela","Poniedzia≈Вek","Wtorek","≈Ъroda","Czwartek","PiƒЕtek","Sobota"];
    
    var TXT = {
        ready: "F.E.S. GOTOWY", work: "PRACA: ", breakTxt: "вШХ PRZERWA", b1: "≈Ъniadanie (15 min)", b2: "Obiad (30 min)",
        confirmBreak: "Przerwa trwa. Zako≈ДczyƒЗ pracƒЩ?", copied: "Skopiowano!", schLast: "Ostatnie", defTask: "Produkcja",
        nfc1: "вП≥ Inicjalizacja modu≈Вu NFC...", nfc2: "рЯЯҐ PWA Web NFC: Aktywne. Zbli≈Љ kartƒЩ...", nfc3: "рЯФµ Karta: ", 
        nfc4: "Uruchom aplikacjƒЩ przez localhost lub HTTPS, aby aktywowaƒЗ NFC.", nfc5: "вЭМ System nie wspiera Web NFC.",
        confirmSunday: "Uruchamiasz automatyczny start pracy w NIEDZIELƒШ. Czy na pewno pracujesz w tym dniu na monta≈Љu?",
        confirmSundayClick: "Dzisiaj jest Niedziela (dzie≈Д wolny). Czy na pewno pracujesz dzisiaj na monta≈Љu i chcesz uruchomiƒЗ rejestracjƒЩ?",
        confirmRel: function(id, name) { return "Chip (" + id.substring(0,8) + "...) jest przypisany do: \"" + name + "\".\n\nCzy chcesz odpiƒЕƒЗ ten chip i przypisaƒЗ go do nowego zadania?\n(Historia starego zadania zostanie zachowana)."; },
        btnAddTask: "+ Zadanie", btnSchedule: "вЪЩпЄП Grafik", stopBtn: "вПє KONIEC PRACY", btnReportDay: "Dzi≈Ы", btnReportMonth: "MiesiƒЕc",
        lblDayModalTitle: "Dzie≈Д", btnSaveDay: "Zapisz", btnCloseDay: "Zamknij", btnCancelSch: "Anuluj", delBtn: "Usu≈Д",
        lblSchTitle: "Ustawienia Grafik / Autostart", lblTaskModalTitle: "Zadanie", lblNfcUid: "UID Karty NFC (zczytaj zbli≈ЉajƒЕc kartƒЩ):",
        phUid: "UID karty przydzieli siƒЩ automatycznie", phName: "Nazwa zadania", btnCopyRep: "Kopiuj Tekst",
        stWork: "рЯТЉ Praca", stOff: "рЯЫС Wolne", stVac: "рЯПЦпЄП Urlop", stSick: "рЯ§Т L4",
        schStart: "Start: ", schEnd: "Koniec: ", schAuto: "Autostart: ", schB1: "Przerwa 1: ", schB2: "Przerwa 2: ",
        repTitle: "Raport: ", colTask: "Zadanie", colTime: "Czas", btnSaveSch: "Zapisz i Wyjd≈Ї", btnSaveTask: "Zapisz", btnCancelTask: "Anuluj", btnCloseRep: "Zamknij",
        lblUserCfg: "U≈Љytkownik (do nazwy pliku i wydruku):", phUser: "np. Jan Kowalski", repEmployee: "Pracownik: ", repSummaryTitle: "=== PODSUMOWANIE CZASU PRACY ===",
        repDetailedTitle: "=== SZCZEG√У≈БOWY CYKL PRAC (DZIE≈Г PO DNIU) ===", repNoTasks: "Brak zada≈Д", repNoMonthTasks: "Brak zarejestrowanych prac w tym miesiƒЕcu.",
        repDateCol: "Data", repTimeCol: "Czas pracy", lblCalendarSection: "Kalendarz i statusy dni", lblReportsSection: "Generowanie raport√≥w czasu pracy"
    };

    if (userLang === 'en') {
        MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        DAYS_SHORT = ['Mo','Tu','We','Th','Fr','Sa','Su'];
        DAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        TXT = {
            ready: "F.E.S. READY", work: "WORK: ", breakTxt: "вШХ BREAK", b1: "Breakfast (15 min)", b2: "Lunch (30 min)",
            confirmBreak: "Break active. End work?", copied: "Copied!", schLast: "Last used", defTask: "Production",
            nfc1: "вП≥ Initializing NFC...", nfc2: "рЯЯҐ Web NFC: Active. Scan card...", nfc3: "рЯФµ Card: ", 
            nfc4: "Run via localhost/HTTPS to enable NFC.", nfc5: "вЭМ NFC not supported.",
            confirmSunday: "You are enabling automatic start for SUNDAY. Are you sure you are working on assembly that day?",
            confirmSundayClick: "Today is Sunday (day off). Are you sure you are working today on assembly and want to start tracking?",
            confirmRel: function(id, name) { return "Chip (" + id.substring(0,8) + "...) is assigned to: \"" + name + "\".\n\nReassign chip to new task?\n(Old task history will be kept)."; },
            btnAddTask: "+ Task", btnSchedule: "вЪЩпЄП Schedule", stopBtn: "вПє END WORK", btnReportDay: "Today", btnReportMonth: "Month",
            lblDayModalTitle: "Day", btnSaveDay: "Save", btnCloseDay: "Close", btnCancelSch: "Cancel", delBtn: "Delete",
            lblSchTitle: "Schedule / Autostart Settings", lblTaskModalTitle: "Task", lblNFCUid: "NFC Card UID (scan by holding close):",
            phUid: "UID will auto-assign", phName: "Task name", btnCopyRep: "Copy Text",
            stWork: "рЯТЉ Work", stOff: "рЯЫС Off", stVac: "рЯПЦпЄП Vacation", stSick: "рЯ§Т Sick",
            schStart: "Start: ", schEnd: "End: ", schAuto: "Autostart: ", schB1: "Break 1: ", schB2: "Break 2: ",
            repTitle: "Report: ", colTask: "Task", colTime: "Time", btnSaveSch: "Save & Exit", btnSaveTask: "Save", btnCancelTask: "Cancel", btnCloseRep: "Close",
            lblUserCfg: "User (for filename and printing):", phUser: "e.g. John Doe", repEmployee: "Employee: ", repSummaryTitle: "=== WORK TIME SUMMARY ===",
            repDetailedTitle: "=== DETAILED DAILY WORK LOG ===", repNoTasks: "No tasks logged", repNoMonthTasks: "No work records found for this month.",
            repDateCol: "Data", repTimeCol: "Work time", lblCalendarSection: "Calendar & Day Statuses", lblReportsSection: "Work Time Reports"
        };
    }

    var state = { tasks: [], history: [], dayStats: {}, activeTask: null, activeBreak: null, lastTaskId: null, schedule: {}, userName: "" };
    var viewDate = new Date();
    var editId = null, selectedDayStr = "", currentReportTxt = "", currentReportData = [];
    var currentReportType = ""; 
    var currentMonthlyDailyDetails = []; 

    function init() {
        translateInterface();

        var saved = null;
        try { saved = localStorage.getItem(KEY); } catch(e){}
        
        if(saved) {
            try { 
                state = JSON.parse(saved); 
                if(!state.userName) state.userName = "";
                if(!state.dayStats) state.dayStats = {};
            } catch(e) { saved = null; }
        }

        if(!saved) {
            state.tasks = [{id:"1", name: TXT.defTask, icon:'рЯП≠'}];
            state.history = [];
            state.dayStats = {};
            state.schedule = {};
            state.userName = "";

            for(var i=0; i<7; i++) { 
                var isFriday = (i === 5);
                state.schedule[i] = { 
                    en: false, 
                    s: "07:00", 
                    e: isFriday ? "12:15" : "15:00", 
                    p1: "09:00", 
                    p2: "12:30", 
                    startTask: "last" 
                }; 
            }
            save();
        }

        renderTasks(); renderCalendar(); initEmojiPicker();
        
        try {
            setInterval(tick, 1000); 
            tick();
        } catch(err) { console.log("Timer crash intercepted: ", err); }
        
        setTimeout(initNFC, 2000);
    }

    function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){} }

    function triggerSundayModal(messageText, onConfirmCallback) {
        var modal = document.getElementById('sundayModal');
        var text = document.getElementById('sundayModalText');
        if(!modal || !text) return;

        text.innerText = messageText;
        modal.style.display = 'flex';

        document.getElementById('btnSundayConfirm').onclick = function() {
            modal.style.display = 'none';
            if(onConfirmCallback) onConfirmCallback();
        };

        document.getElementById('btnSundayCancel').onclick = function() {
            modal.style.display = 'none';
        };
    }

    function tick() {
        var now = new Date();
        var time = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        var sch = state.schedule[now.getDay()];
        var todayStr = getTodayStr(now);
        var stat = state.dayStats[todayStr] || (now.getDay() === 0 ? "off" : "work");

        if(stat === "work" && sch && sch.en) {
            if(time === sch.s && !state.activeTask && !state.activeBreak) {
                var defId = state.tasks[0] ? state.tasks[0].id : "1";
                startTaskDirectly(sch.startTask === "last" ? (state.lastTaskId || defId) : sch.startTask);
            }
            if((state.activeTask || state.activeBreak) && time >= sch.e && sch.e !== "") { state.activeBreak = null; stopTask(); }
            handleAutoBreak(time, sch.p1, 1, 15);
            handleAutoBreak(time, sch.p2, 2, 30);
        }
        updateUI();
    }

    function handleAutoBreak(nowT, startT, bid, dur) {
        if(!startT) return;
        var endT = addMins(startT, dur);
        if(nowT === startT && state.activeBreak !== bid) {
            if(state.activeTask && state.activeTask.id) { state.lastTaskId = state.activeTask.id.toString(); stopTask(); }
            state.activeBreak = bid; save(); renderTasks();
        } else if (state.activeBreak === bid && nowT >= endT) {
            state.activeBreak = null;
            if(state.lastTaskId) startTaskDirectly(state.lastTaskId);
            save(); renderTasks();
        }
    }

    function startTask(id) {
        if (!id) return;
        var now = new Date();
        var todayStr = getTodayStr(now);
        var stat = state.dayStats[todayStr] || (now.getDay() === 0 ? "off" : "work");

        if (stat === "off" && now.getDay() === 0) {
            triggerSundayModal(TXT.confirmSundayClick, function() {
                state.dayStats[todayStr] = "work";
                save();
                renderCalendar();
                startTaskDirectly(id);
            });
        } else {
            startTaskDirectly(id);
        }
    }

    function startTaskDirectly(id) {
        var t = state.tasks.find(function(x) { return x.id.toString() === id.toString(); });
        if(!t || state.activeBreak) return;
        if(state.activeTask) stopTask();
        
        var now = new Date();
        var todayStr = getTodayStr(now);
        var startTime = Date.now();
        var sch = state.schedule[now.getDay()];
        
        if (sch && sch.en && sch.s === "07:00") {
            var hasLogsToday = state.history.some(function(h) { return getTodayStr(new Date(h.start)) === todayStr; });
            if (!hasLogsToday) {
                var targetStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 7, 0, 0, 0);
                if (startTime > targetStart.getTime()) {
                    startTime = targetStart.getTime();
                }
            }
        }

        state.activeTask = { id: t.id.toString(), name: t.name, start: startTime };
        state.lastTaskId = t.id.toString();
        save(); renderTasks();
    }

    function stopTask() {
        if(state.activeTask) { state.history.push(Object.assign({}, state.activeTask, {end: Date.now()})); state.activeTask = null; }

    if (!String.prototype.padStart) {
        String.prototype.padStart = function padStart(targetLength, padString) {
            targetLength = targetLength >> 0;
            padString = String(typeof padString !== 'undefined' ? padString : ' ');
            if (this.length >= targetLength) { return String(this); }
            else {
                targetLength = targetLength - this.length;
                if (targetLength > padString.length) { padString += padString.repeat(targetLength / padString.length); }
                return padString.slice(0, targetLength) + String(this);
            }
        };
    }

    function formatTimeDisplay(ms) {
        if (isNaN(ms) || ms < 0) return "00:00:00";
        var totalSecs = Math.floor(ms / 1000);
        var secs = totalSecs % 60;
        var totalMins = Math.floor(totalSecs / 60);
        var mins = totalMins % 60;
        var hours = Math.floor(totalMins / 60);
        return hours.toString().padStart(2,'0') + ":" + mins.toString().padStart(2,'0') + ":" + secs.toString().padStart(2,'0');
    }

    function initDragAndDrop() {
        var grid = document.getElementById('chipGrid');
        if (!grid) return;
        var items = grid.querySelectorAll('.chip-btn');
        
        items.forEach(function(item) {
            item.addEventListener('dragstart', function(e) {
                item.classList.add('dragging');
                e.dataTransfer.setData('text/plain', item.getAttribute('data-id'));
            });

            item.addEventListener('dragend', function() {
                item.classList.remove('dragging');
                reorderTasksFromDOM();
            });

            item.addEventListener('dragover', function(e) {
                e.preventDefault();
                var draggingItem = grid.querySelector('.dragging');
                if (!draggingItem || draggingItem === item) return;
                
                var bounding = item.getBoundingClientRect();
                var offset = e.clientX - bounding.left - bounding.width / 2;
                if (offset > 0) { item.after(draggingItem); } else { item.before(draggingItem); }
            });

            item.addEventListener('touchstart', function(e) {
                if (e.target.classList.contains('edit-btn')) return;
                item.classList.add('dragging');
            }, {passive: true});

            item.addEventListener('touchend', function() {
                if (item.classList.contains('dragging')) {
                    item.classList.remove('dragging');
                    reorderTasksFromDOM();
                }
            });

            item.addEventListener('touchmove', function(e) {
                if (!item.classList.contains('dragging')) return;
                var touch = e.touches[0];
                var target = document.elementFromPoint(touch.clientX, touch.clientY);
                if (!target) return;
                var closestBtn = target.closest('.chip-btn');
                if (closestBtn && closestBtn !== item && closestBtn.parentNode === grid) {
                    var bounding = closestBtn.getBoundingClientRect();
                    var offset = touch.clientX - bounding.left - bounding.width / 2;
                    if (offset > 0) { closestBtn.after(item); } else { closestBtn.before(item); }
                }
            }, {passive: true});
        });
    }

    function processAndSmoothLogs(rawLogs) {
        if(rawLogs.length === 0) return [];
        
        var processed = rawLogs.map(function(l) {
            return { name: l.name, start: l.start, end: l.end || Date.now() };
        }).sort(function(a, b) { return a.start - b.start; });

        var lastLog = processed[processed.length - 1];
        var lastEndDate = new Date(lastLog.end);
        var sch = state.schedule[lastEndDate.getDay()];
        if (sch && sch.e) {
            var schParts = sch.e.split(':').map(Number);
            var schEndMs = new Date(lastEndDate.getFullYear(), lastEndDate.getMonth(), lastEndDate.getDate(), schParts[0], schParts[1], 0, 0).getTime();
            if (lastLog.end < schEndMs && (schEndMs - lastLog.end) <= 30 * 60 * 1000) { lastLog.end = schEndMs; }
        }

        var finalLogs = [];
        for (var i = 0; i < processed.length; i++) {
            var current = processed[i];
            var durationMin = (current.end - current.start) / 60000;
            
            if (durationMin < 10) {
                var distributeMs = current.end - current.start;
                if (i > 0 && i < processed.length - 1) {
                    var half = Math.floor(distributeMs / 2);
                    processed[i-1].end += half;
                    processed[i+1].start -= (distributeMs - half);
                } else if (i > 0) {
                    processed[i-1].end += distributeMs;
                } else if (i < processed.length - 1) {
                    processed[i+1].start -= distributeMs;
                }
            } else { finalLogs.push(current); }
        }

        finalLogs.forEach(function(l) {
            var actualMin = (l.end - l.start) / 60000;
            var roundedMin = actualMin;
            
            if (actualMin >= 10 && actualMin < 15) { roundedMin = 15; } else {
                roundedMin = Math.round(actualMin / 15) * 15;
                if (roundedMin === 0 && actualMin > 0) roundedMin = 15;
            }
            l.calculatedMs = roundedMin * 60 * 1000;
        });

        return finalLogs;
    }

    function showTextReport(type) {
        currentReportType = type; 
        var logs = state.history || []; 
        var title = type === 'dobowy' ? getTodayStr(new Date()) : MONTHS[viewDate.getMonth()] + " " + viewDate.getFullYear();
        
        if(type === 'dobowy') {
            logs = logs.filter(function(h) { return getTodayStr(new Date(h.start)) === title; });
        } else {
            logs = logs.filter(function(h) { 
                var d = new Date(h.start);
                return d.getMonth() === viewDate.getMonth() && d.getFullYear() === viewDate.getFullYear(); 
            });
        }

        var summary = {}; var total = 0;
        
        if (type === 'dobowy') {
            var smoothed = processAndSmoothLogs(logs);
            smoothed.forEach(function(l) {
                summary[l.name] = (summary[l.name] || 0) + l.calculatedMs;
                total += l.calculatedMs;
            });
        } else {
            var daysMap = {};
            logs.forEach(function(l) {
                var dKey = getTodayStr(new Date(l.start));
                if (!daysMap[dKey]) daysMap[dKey] = [];
                daysMap[dKey].push(l);
            });
            Object.keys(daysMap).forEach(function(dKey) {
                var smoothedDay = processAndSmoothLogs(daysMap[dKey]);
                smoothedDay.forEach(function(l) {
                    summary[l.name] = (summary[l.name] || 0) + l.calculatedMs;
                    total += l.calculatedMs;
                });
            });
        }
        
        currentReportData = []; 
        var html = '';
        if (state.userName) { html += '<p id="reportUserHeader" style="margin:0 0 10px 0; font-weight:bold; color:#4a90e2;">' + TXT.repEmployee + state.userName + '</p>'; }
        
        html += '<p style="margin:5px 0; font-weight:bold; border-bottom:1px solid #ddd; padding-bottom:3px;">' + TXT.repSummaryTitle.replace(/===/g, '') + ':</p><ul>';
        var keys = Object.keys(summary);
        for(var k=0; k<keys.length; k++) {
            var n = keys[k]; var t = summary[n]; var s = formatMs(t); 
            html += '<li>' + n + ': <b>' + s + '</b></li>'; 
            currentReportData.push([n, s]);
        }
        if(keys.length === 0) html += '<li>' + TXT.repNoTasks + '</li>';
        
        html += '</ul><p style="margin-bottom:15px;"><b>RAZEM W OKRESIE: ' + formatMs(total) + '</b></p>';
        currentReportData.push(["RAZEM", formatMs(total)]);

        var userPrefix = state.userName ? TXT.repEmployee + state.userName + "\n" : "";
        currentReportTxt = userPrefix + TXT.repTitle + title + "\n\n" + TXT.repSummaryTitle + "\n" + currentReportData.map(function(r) { return r.join(": "); }).join("\n");

        currentMonthlyDailyDetails = [];
        if(type === 'miesieczny') {
            html += '<p style="margin:15px 0 5px 0; font-weight:bold; border-bottom:1px solid #ddd; padding-bottom:3px;">' + TXT.repDetailedTitle.replace(/===/g, '') + ':</p>';
            currentReportTxt += "\n\n" + TXT.repDetailedTitle;
            
            var dailyGroups = {};
            var daysMap = {};
            logs.forEach(function(l) {
                var dKey = getTodayStr(new Date(l.start));
                if (!daysMap[dKey]) daysMap[dKey] = [];
                daysMap[dKey].push(l);
            });

            Object.keys(daysMap).forEach(function(dKey) {
                var smoothedDay = processAndSmoothLogs(daysMap[dKey]);
                if(!dailyGroups[dKey]) dailyGroups[dKey] = {};
                smoothedDay.forEach(function(l) { dailyGroups[dKey][l.name] = (dailyGroups[dKey][l.name] || 0) + l.calculatedMs; });
            });

            var sortedDays = Object.keys(dailyGroups).sort();
            if(sortedDays.length === 0) {
                html += '<p style="font-size:0.9rem; color:#888; font-style:italic;">' + TXT.repNoMonthTasks + '</p>';
            } else {
                sortedDays.forEach(function(dayStr) {
                    html += '<div style="margin-top:8px; font-size:0.9rem;"><b style="color:#2c3e50;">рЯУЕ ' + dayStr + '</b><ul style="margin:2px 0 10px 0; padding-left:20px;">';
                    currentReportTxt += "\nрЯУЕ " + dayStr + ":";
                    
                    Object.keys(dailyGroups[dayStr]).forEach(function(taskName) {
                        var ms = dailyGroups[dayStr][taskName];
                        var formatted = formatMs(ms);
                        html += '<li>' + taskName + ': ' + formatted + '</li>';
                        currentReportTxt += "\n  - " + taskName + ": " + formatted;
                        currentMonthlyDailyDetails.push([dayStr, taskName, formatted]);
                    });
                    html += '</ul></div>';
                });
            }
        }

        document.getElementById('reportView').innerHTML = html; 
        document.getElementById('reportTitle').innerText = TXT.repTitle + title; 
        document.getElementById('reportModal').style.display = 'flex';
    }

    async function initNFC() {
        var display = document.getElementById('nfcStatusDisplay');
        if (window && 'NDEFReader' in window) {
            try {
                var ndef = new NDEFReader();
                if (display) display.innerText = TXT.nfc1;
                await ndef.scan();
                if (display) display.innerText = TXT.nfc2;
                
                ndef.addEventListener("reading", function(event) {
                    var serialNumber = event.serialNumber;
                    if (!serialNumber) return;
                    var cardUID = serialNumber.toLowerCase();
                    if (display) display.innerText = TXT.nfc3 + cardUID;
                    
                    var idInput = document.getElementById('eId');
                    var editModal = document.getElementById('editModal');
                    if (editModal && editModal.style.display === 'flex' && idInput && !idInput.disabled) {
                        idInput.value = cardUID;
                        return;
                    }
                    if (cardUID === "stop") stopTaskManually(); else startTask(cardUID);
                    setTimeout(function() { if(display) display.innerText = TXT.nfc2; }, 3000);
                });
            } catch (error) { if (display) display.innerText = TXT.nfc4; }
        } else { if (display) display.innerText = TXT.nfc5; }
    }

    if (document.readyState === "complete" || document.readyState === "interactive") { setTimeout(init, 1); } else { document.addEventListener("DOMContentLoaded", init); }
</script>
